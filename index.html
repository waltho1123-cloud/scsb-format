<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海銀行匯款格式轉換</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');

  :root {
    --navy: #1b2b4a;
    --navy-light: #2a3f63;
    --navy-soft: rgba(27, 43, 74, 0.07);
    --pill-bg: rgba(255, 255, 255, 0.55);
    --pill-bg-hover: rgba(255, 255, 255, 0.72);
    --pill-border: rgba(255, 255, 255, 0.65);
    --pill-shadow: 0 2px 16px rgba(27, 43, 74, 0.06), 0 1px 4px rgba(27, 43, 74, 0.04);
    --pill-shadow-hover: 0 4px 24px rgba(27, 43, 74, 0.09), 0 1px 6px rgba(27, 43, 74, 0.05);
    --inset: inset 0 1px 3px rgba(27, 43, 74, 0.06);
    --text-primary: #1b2b4a;
    --text-secondary: #5a6a82;
    --text-muted: #98a5b8;
    --success: #2d9d78;
    --success-bg: rgba(45, 157, 120, 0.08);
    --error: #d94f4f;
    --error-bg: rgba(217, 79, 79, 0.08);
    --radius-pill: 50px;
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #eaecf1;
    background-image: linear-gradient(175deg, #cdd8ea 0%, #dfe4ed 30%, #eaecf1 55%, #f0f1f4 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 32px;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 920px; width: 100%; }

  /* --- Header --- */
  .header { text-align: center; margin-bottom: 40px; }

  h1 {
    text-align: center;
    color: var(--navy);
    margin: 0 0 8px;
    font-size: 1.85rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .subtitle {
    text-align: center;
    color: var(--text-secondary);
    margin-bottom: 0;
    font-size: 0.88rem;
    font-weight: 400;
    line-height: 1.65;
    letter-spacing: 0.005em;
  }

  /* --- Glass Pill Card --- */
  .card {
    background: var(--pill-bg);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    border: 1px solid var(--pill-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--pill-shadow);
    padding: 36px;
    margin-bottom: 24px;
    transition: box-shadow 0.35s ease, background 0.35s ease;
  }
  .card:hover {
    box-shadow: var(--pill-shadow-hover);
    background: var(--pill-bg-hover);
  }

  /* --- Upload Zone --- */
  .upload-zone {
    border: 1.5px dashed rgba(27, 43, 74, 0.18);
    border-radius: var(--radius-md);
    padding: 52px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.3);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--navy);
    background: rgba(27, 43, 74, 0.03);
    box-shadow: 0 0 0 3px rgba(27, 43, 74, 0.06);
  }

  .upload-zone .icon {
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
  }
  .upload-zone p {
    color: var(--text-secondary);
    font-size: 0.92rem;
  }
  .upload-zone p strong {
    color: var(--text-primary);
    font-weight: 600;
  }
  .upload-zone .hint {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 6px;
  }

  #fileInput { display: none; }

  /* --- Required Fields --- */
  .required-fields {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 2;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid rgba(27, 43, 74, 0.07);
  }
  .required-fields strong {
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 0.8rem;
  }
  .required-fields code {
    background: rgba(27, 43, 74, 0.05);
    color: var(--navy);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    font-weight: 500;
    white-space: nowrap;
    border: 1px solid rgba(27, 43, 74, 0.06);
  }

  /* --- Info Bar --- */
  .info-bar { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }

  .info-item {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    flex: 1;
    min-width: 140px;
    box-shadow: 0 1px 8px rgba(27, 43, 74, 0.04);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .info-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--pill-shadow);
  }
  .info-item .label {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .info-item .value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--navy);
    margin-top: 4px;
    letter-spacing: -0.01em;
  }

  /* --- Table --- */
  .table-wrap {
    overflow-x: auto;
    margin: 20px 0;
    max-height: 420px;
    overflow-y: auto;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.5);
  }
  .table-wrap::-webkit-scrollbar { width: 5px; height: 5px; }
  .table-wrap::-webkit-scrollbar-track { background: transparent; }
  .table-wrap::-webkit-scrollbar-thumb { background: rgba(27, 43, 74, 0.15); border-radius: 3px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: rgba(27, 43, 74, 0.25); }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    background: rgba(27, 43, 74, 0.04);
    color: var(--text-primary);
    font-weight: 600;
    font-size: 0.73rem;
    letter-spacing: 0.03em;
    position: sticky;
    top: 0;
    z-index: 1;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  th, td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid rgba(27, 43, 74, 0.05);
    white-space: nowrap;
  }
  td { color: var(--text-secondary); font-weight: 400; }
  tr:hover td { background: rgba(27, 43, 74, 0.02); }

  /* --- Buttons (pill shape) --- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 32px;
    border: none;
    border-radius: var(--radius-pill);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.005em;
  }

  .btn-primary {
    background: var(--navy);
    color: #fff;
    box-shadow: 0 3px 14px rgba(27, 43, 74, 0.2);
  }
  .btn-primary:hover {
    background: var(--navy-light);
    transform: translateY(-2px);
    box-shadow: 0 6px 22px rgba(27, 43, 74, 0.25);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: #b0b8c6;
    box-shadow: 0 2px 8px rgba(27, 43, 74, 0.08);
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.6);
    color: var(--text-secondary);
    border: 1px solid rgba(27, 43, 74, 0.1);
    box-shadow: 0 1px 6px rgba(27, 43, 74, 0.04);
  }
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.8);
    transform: translateY(-2px);
    box-shadow: var(--pill-shadow);
    color: var(--text-primary);
  }

  .actions { display: flex; gap: 14px; justify-content: center; margin-top: 28px; }

  /* --- Status --- */
  .status {
    text-align: center;
    padding: 14px 20px;
    border-radius: var(--radius-pill);
    margin-top: 20px;
    font-weight: 500;
    font-size: 0.88rem;
    border: 1px solid transparent;
  }
  .status.success {
    background: var(--success-bg);
    color: var(--success);
    border-color: rgba(45, 157, 120, 0.12);
  }
  .status.error {
    background: var(--error-bg);
    color: var(--error);
    border-color: rgba(217, 79, 79, 0.12);
  }

  .hidden { display: none; }

  /* --- Footer --- */
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-muted);
    letter-spacing: 0.01em;
  }

  /* --- Animations --- */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeIn 0.45s ease both; }
  #resultSection .card { animation-delay: 0.08s; }

  /* --- Responsive --- */
  @media (max-width: 640px) {
    body { padding: 24px 14px 20px; }
    h1 { font-size: 1.45rem; }
    .card { padding: 24px 20px; border-radius: 20px; }
    .upload-zone { padding: 36px 16px; }
    .info-bar { gap: 8px; }
    .info-item { min-width: 110px; padding: 12px 14px; }
    .actions { flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>上海銀行匯款格式轉換</h1>
    <p class="subtitle">上傳 Excel 匯款檔案，自動轉換為上海銀行 eWB 台幣多筆匯出<br>TXT 格式（Big5 編碼，每筆 362 bytes）</p>
  </div>

  <div class="card">
    <div class="upload-zone" id="dropZone">
      <div class="icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p><strong>點擊或拖曳上傳 Excel 檔案</strong></p>
      <p class="hint">支援 .xlsx / .xls 格式</p>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="required-fields">
      <strong>Excel 必要欄位</strong><br>
      <code>付款人統編</code> <code>付款人戶名</code> <code>付款日期</code>
      <code>付款銀行代號</code> <code>付款人帳號</code> <code>付款金額</code>
      <code>業務別</code> <code>收款人戶名</code> <code>付款相關附言</code>
      <code>收款銀行代號</code> <code>收款人帳號</code> <code>手續費負擔</code>
    </div>
  </div>

  <div id="resultSection" class="hidden">
    <div class="card">
      <div class="info-bar">
        <div class="info-item">
          <div class="label">檔案名稱</div>
          <div class="value" id="infoFile">-</div>
        </div>
        <div class="info-item">
          <div class="label">有效筆數</div>
          <div class="value" id="infoCount">-</div>
        </div>
        <div class="info-item">
          <div class="label">總金額</div>
          <div class="value" id="infoAmount">-</div>
        </div>
        <div class="info-item">
          <div class="label">檔案大小</div>
          <div class="value" id="infoSize">-</div>
        </div>
      </div>
      <div class="table-wrap">
        <table id="previewTable"><thead></thead><tbody></tbody></table>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="downloadBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          下載 TXT 檔案
        </button>
        <button class="btn btn-secondary" id="resetBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          重新上傳
        </button>
      </div>
      <div id="statusMsg" class="status hidden"></div>
    </div>
  </div>
</div>
<footer>上海銀行匯款格式轉換 v4 — 純前端處理，資料不會上傳至伺服器</footer>

<script src="big5map.js"></script>
<script>
// Big5 編碼映射表（loaded from big5map.js）

// 解碼映射表
function initBig5Map() {
  const raw = Uint8Array.from(atob(BIG5_B64), c => c.charCodeAt(0));
  const map = new Map();
  for (let i = 0; i < raw.length; i += 4) {
    const cp = (raw[i] << 8) | raw[i + 1];
    map.set(cp, [raw[i + 2], raw[i + 3]]);
  }
  return map;
}
const big5Map = initBig5Map();

function encodeBig5(text) {
  const bytes = [];
  for (const char of String(text || '')) {
    const cp = char.codePointAt(0);
    if (cp < 0x80) {
      bytes.push(cp);
    } else {
      const b = big5Map.get(cp);
      if (b) { bytes.push(b[0], b[1]); }
      else { bytes.push(0x3F); }
    }
  }
  return new Uint8Array(bytes);
}

function padB(text, len) {
  const e = encodeBig5(text);
  if (e.length >= len) return e.slice(0, len);
  const r = new Uint8Array(len).fill(0x20);
  r.set(e, 0);
  return r;
}

function padZ(val, len) {
  const s = String(Math.floor(Number(val) || 0)).padStart(len, '0').slice(0, len);
  return new TextEncoder().encode(s);
}

function padZL(val, len) {
  const s = String(val || '').padStart(len, '0').slice(0, len);
  return new TextEncoder().encode(s);
}

function padA(text, len) {
  const s = String(text || '').padEnd(len, ' ').slice(0, len);
  return new TextEncoder().encode(s);
}

function concatUint8Arrays(...arrays) {
  const total = arrays.reduce((sum, a) => sum + a.length, 0);
  const result = new Uint8Array(total);
  let offset = 0;
  for (const a of arrays) { result.set(a, offset); offset += a.length; }
  return result;
}

// ============================================================
// UI
// ============================================================
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const resultSection = document.getElementById('resultSection');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const statusMsg = document.getElementById('statusMsg');
let generatedBlob = null;
let generatedFileName = '';

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files.length > 0) processFile(e.target.files[0]);
});
downloadBtn.addEventListener('click', () => {
  if (!generatedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(generatedBlob);
  a.download = generatedFileName;
  a.click();
  URL.revokeObjectURL(a.href);
  showStatus('success', '✅ 檔案已開始下載');
});
resetBtn.addEventListener('click', () => {
  resultSection.classList.add('hidden');
  fileInput.value = '';
  generatedBlob = null;
  generatedFileName = '';
  downloadBtn.disabled = true;
  statusMsg.classList.add('hidden');
});

function showStatus(type, msg) {
  statusMsg.className = 'status ' + type;
  statusMsg.textContent = msg;
  statusMsg.classList.remove('hidden');
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonRows = XLSX.utils.sheet_to_json(sheet);
      if (jsonRows.length === 0) { showStatus('error', '❌ Excel 檔案中沒有資料'); return; }
      const result = convertToTxt(jsonRows);
      displayResult(result);
    } catch (err) {
      showStatus('error', '❌ ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function convertToTxt(jsonRows) {
  const rows = [];
  for (const d of jsonRows) {
    const payerId = String(d['付款人統編'] || d['付款人統一編號'] || '').trim();
    if (!payerId) continue;
    rows.push({
      payerId,
      payerName:    String(d['付款人戶名'] || d['付款人名稱'] || '').trim(),
      paymentDate:  String(d['付款日期'] || '').trim(),
      payingBank:   String(d['付款銀行代號'] || d['付款行代號'] || '').trim(),
      payerAc:      String(d['付款人帳號'] || d['付款帳號'] || '').trim(),
      debitAmount:  parseInt(d['付款金額'] || d['金額'] || 0),
      businessType: String(d['業務別'] || 'ADV').trim(),
      payeeName:    String(d['收款人戶名'] || d['收款人名稱'] || '').trim(),
      memo:         String(d['付款相關附言'] || d['附言'] || '').trim(),
      receiverBank: String(d['收款銀行代號'] || d['收款行代號'] || '').trim(),
      payeeAc:      String(d['收款人帳號'] || d['收款帳號'] || '').trim(),
      feePaidBy:    String(d['收續費負擔'] || d['手續費負擔'] || 'Payer').trim()
    });
  }
  if (rows.length === 0) throw new Error('沒有找到有效的匯款資料列（需要「付款人統編」欄位）');

  const outputLines = [];
  for (const row of rows) {
    let fee = row.feePaidBy;
    if (fee.toLowerCase() === 'payer') fee = 'Payer';
    else if (fee.toLowerCase() === 'payee') fee = 'Payee';
    let payerAc = row.payerAc;
    if (payerAc.length < 16 && !payerAc.startsWith('0')) payerAc = '0' + payerAc;

    const record = concatUint8Arrays(
      padB(row.payerId, 12),
      padB(row.payerName, 80),
      padA(row.paymentDate, 8),
      padZL(row.payingBank, 7),
      padB(payerAc, 16),
      padZ(row.debitAmount, 18),
      padA(row.businessType, 3),
      padB(row.payeeName, 80),
      padB(row.memo, 40),
      padZL(row.receiverBank, 7),
      padB(row.payeeAc, 16),
      padZ(row.debitAmount, 18),
      new Uint8Array(12).fill(0x20),
      new Uint8Array(40).fill(0x20),
      padA(fee, 5)
    );
    if (record.length !== 362) throw new Error('記錄長度 ' + record.length + ' bytes，應為 362');
    outputLines.push(record);
  }

  const crlf = new Uint8Array([0x0D, 0x0A]);
  const buffers = [];
  for (const line of outputLines) { buffers.push(line); buffers.push(crlf); }
  const finalBuffer = concatUint8Arrays(...buffers);
  const totalAmount = rows.reduce((s, r) => s + r.debitAmount, 0);
  const fileDate = rows[0].paymentDate;
  const fileName = '上海銀行匯款資料' + fileDate + '_' + rows.length + '筆_' + totalAmount + '_元.txt';
  return { fileName, totalAmount, recordCount: rows.length, fileSize: finalBuffer.length, buffer: finalBuffer, rows };
}

function displayResult(result) {
  resultSection.classList.remove('hidden');
  document.getElementById('infoFile').textContent = result.fileName;
  document.getElementById('infoCount').textContent = result.recordCount + ' 筆';
  document.getElementById('infoAmount').textContent = result.totalAmount.toLocaleString() + ' 元';
  document.getElementById('infoSize').textContent = result.fileSize.toLocaleString() + ' bytes';

  const headers = ['#','付款人統編','付款人戶名','付款日期','付款銀行代號','付款人帳號','付款金額','業務別','收款人戶名','收款銀行代號','收款人帳號','手續費負擔'];
  const thead = document.querySelector('#previewTable thead');
  thead.innerHTML = '<tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr>';
  const tbody = document.querySelector('#previewTable tbody');
  tbody.innerHTML = '';
  result.rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = [i+1,r.payerId,r.payerName,r.paymentDate,r.payingBank,r.payerAc,r.debitAmount.toLocaleString(),r.businessType,r.payeeName,r.receiverBank,r.payeeAc,r.feePaidBy].map(v => '<td>'+v+'</td>').join('');
    tbody.appendChild(tr);
  });

  generatedBlob = new Blob([result.buffer], { type: 'application/octet-stream' });
  generatedFileName = result.fileName;
  downloadBtn.disabled = false;
  showStatus('success', '✅ 成功轉換 ' + result.recordCount + ' 筆，總金額 ' + result.totalAmount.toLocaleString() + ' 元');
}
</script>
